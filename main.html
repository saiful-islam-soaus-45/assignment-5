<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/downloaded.png" type="image/x-icon">

    <!-- font awsome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font style -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Geist:wght@100..900&family=Outfit:wght@100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- tailwind and daisiUi  -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Github-Issue-Tracker</title>
</head>

<body>
    <div class="main-nav flex w-11/12 mx-auto">
        <div class="flex flex-row w-11/12 mx-auto gap-1 md:gap-5 pt-10 items-center">
            <img src="assets/github-logo.png" class="w-7 md:w-12" alt="">
            <p class="font-semibold text-[15px] md:text-2xl">GitHub Issues Tracker</p>
        </div>

        <div class="flex flex-col md:flex md:flex-row items-center gap-4 p-4 mt-15 w-[500px]">
            <div class="relative flex-grow max-w-sm">
                <div onclick="searchIssues()"
                    class="absolute inset-y-0 left-0 flex items-center pl-3 cursor-pointer z-10">
                    <svg class="w-5 h-5 text-gray-400 hover:text-[#5D00FF] transition-colors" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>

                <input id="search-input" type="text" placeholder="Search issues..."
                    class="block w-full p-2.5 pl-10 text-sm text-gray-900 border border-gray-200 rounded-lg bg-white focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <button onclick="searchIssues()" type="button"
                class="btn flex items-center gap-2 px-5 py-2.5 text-sm font-semibold text-white bg-[#5D00FF] hover:bg-opacity-90 rounded-lg transition-colors cursor-pointer">
                Search
            </button>
        </div>
    </div>

    <!-- main page 2 nav bar  -->
    <div class="w-11/12 mx-auto space-y-4 mt-10">

        <div class="bg-white p-2 rounded-lg border border-gray-100 shadow-sm flex gap-2 w-fit">
            <button id="btn-all" onclick="filterIssues('all')"
                class="btn px-6 py-2 bg-[#5D00FF] text-white font-medium rounded-md shadow-sm transition-all cursor-pointer">
                All
            </button>
            <button id="btn-open" onclick="filterIssues('open')"
                class="btn px-6 py-2 bg-white text-slate-500 font-medium rounded-md border border-gray-100 hover:bg-gray-50 transition-all cursor-pointer">
                Open
            </button>
            <button id="btn-closed" onclick="filterIssues('closed')"
                class="btn px-6 py-2 bg-white text-slate-500 font-medium rounded-md border border-gray-100 hover:bg-gray-50 transition-all cursor-pointer">
                Closed
            </button>
        </div>

        <div class="bg-white p-5 rounded-lg border border-gray-100 shadow-sm flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center">
                    <img src="assets/Aperture.png" alt="icon" class="w-6 h-6">
                </div>

                <div>
                    <h2 id="total-issue-count" class="text-xl font-bold text-slate-800">0 Issues</h2>
                    <p class="text-slate-500 text-sm">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-6 items-center">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-[#00A36C]"></span>
                    <span class="text-sm font-medium text-slate-700">Open</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-purple-700"></span>
                    <span class="text-sm font-medium text-slate-700">Closed</span>
                </div>
            </div>
        </div>
    </div>

    <!--  -->

    <div id="card-item" class="w-11/12 mx-auto  px-5 py-10  mt-10 grid grid-cols-1 md:grid-cols-3 gap-8">

    </div>

    <script src="javascripts/all.js"></script>

    <div id="issue-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-[400px] md:max-w-2xl w-full p-8 relative shadow-2xl">
            <button onclick="closeModal()"
                class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl cursor-pointer">&times;</button>

            <div id="modal-content">
            </div>
        </div>
    </div>
</body>

</html>
