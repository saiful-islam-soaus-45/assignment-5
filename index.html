<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- font awsome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font style -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Geist:wght@100..900&family=Outfit:wght@100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- tailwind and daisiUi  -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Login page</title>

</head>

<body class="">
    <!-- Login page -->
    <div class="Login page flex flex-col gap-y-4 pt-12 items-center justify-center w-11/12 mx-auto ">
        <img src="assets/github-logo.png" alt="">
        <p class="font-semibold text-3xl">GitHub Issues Tracker</p>
        <p class="text-gray-500 -mt-4">Sign in to manage your issues</p>
    </div>

    <div class="max-w-sm p-6 bg-white rounded-xl w-11/12 mx-auto pt-5 mt-5">
        <div class="mb-5">
            <label class="block mb-2 text-lg font-semibold text-gray-800">Username</label>
            <input id="usernameInput" type="text text-gray-500" placeholder="Enter Username"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 placeholder-gray-400 text-gray-600">
            <p class="mt-1.5 text-sm text-purple-600 font-medium">Default: admin</p>
        </div>

        <div class="mb-5">
            <label class="block mb-2 text-lg font-semibold text-gray-800">Password</label>
            <input id="passwordInput" type="password text-gray-500" placeholder="Enter Password"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 placeholder-gray-400 text-gray-600">
            <p class="mt-1.5 text-sm text-purple-600 font-medium">Default: admin123</p>
        </div>
    </div>

    <div class="max-w-sm space-y-6 w-11/12 mx-auto pb-8">
        <button id="signInBtn" class=" btn w-full h-12 text-center cursor-pointer py-4 bg-[#5b00ff] text-white font-bold rounded-xl transition hover:bg-opacity-90">
            Sign In
        </button>

        <div class="relative flex items-center">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink mx-4 text-gray-500 text-sm font-medium">OR</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <div class="text-center">
            <p class="text-slate-400 text-sm mb-3">Demo Credentials:</p>
            <div class="bg-slate-50 rounded-xl p-6 border border-slate-100/50">
                <p class="text-slate-700">
                    <span class="font-bold">Username:</span> admin
                </p>
                <p class="text-slate-700">
                    <span class="font-bold">Password:</span> admin123
                </p>

                <p id="errorMessage" class="mt-2 text-red-500 text-sm font-medium hidden">
                  Wrong username or password!
                </p>
            </div>
        </div>
    </div>

    <script src="javascripts/script.js"></script>
</body>

</html>
