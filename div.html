<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- font awsome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font style -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Geist:wght@100..900&family=Outfit:wght@100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- tailwind and daisiUi  -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>

<body>
    <div class="bg-gray-50 p-8  border border-red-500 w-11/12 mx-auto">
        <div class="max-w-4xl mx-auto space-y-4">

            <div class="bg-white p-4 rounded-lg border border-gray-100 shadow-sm flex gap-2">
                <button class="btn px-6 py-2 bg-indigo-600 text-white font-medium rounded-md shadow-sm transition-all">
                    All
                </button>
                <button
                    class="btn px-6 py-2 bg-white text-slate-500 font-medium rounded-md border border-gray-200 hover:bg-gray-50 transition-all">
                    Open
                </button>
                <button
                    class="btn px-6 py-2 bg-white text-slate-500 font-medium rounded-md border border-gray-200 hover:bg-gray-50 transition-all">
                    Closed
                </button>
            </div>

            <div class="bg-white p-6 rounded-lg border border-gray-100 shadow-sm flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center">
                        <img src="assets/Aperture.png" alt="">
                    </div>

                    <div>
                        <h2 class="text-xl font-bold text-slate-800">50 Issues</h2>
                        <p class="text-slate-500 text-sm">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex gap-6 items-center">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-[#00A36C]"></span>
                        <span class="text-sm font-medium text-slate-700">Open</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-[#7e22ce]"></span>
                        <span class="text-sm font-medium text-slate-700">Closed</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <!--  -->
    <div class=" mx-auto  px-5 md:px-8 mt-10 grid grid-cols-1 md:grid-cols-4 gap-8">
        <div class="max-w-sm bg-white rounded-xl overflow-hidden font-sans w-[300px] mx-auto shadow-md ">
            <div class="h-1.5 bg-[#00A36C]"></div>

            <div class="p-5">
                <div class="flex justify-between items-center mb-4">
                    <div class="w-8 h-8 rounded-full bg-[#E6F6F0] flex items-center justify-center">
                        <div class="w-5 h-5 rounded-full border-2 border-dashed border-[#00A36C]"></div>
                    </div>
                    <span
                        class="px-4 py-1 rounded-full bg-[#FFF0F0] text-[#FF4D4D] text-xs font-bold uppercase tracking-wider">
                        HIGH
                    </span>
                </div>

                <h2 class="text-[#1A2B3B] text-xl font-bold leading-tight mb-2">
                    ${All.title}
                </h2>

                <p class="text-slate-500 text-sm mb-6 line-clamp-2">
                    ${All.description}
                </p>

                <div class="flex gap-2 mb-6">
                    <span
                        class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-[#FFF0F0] text-[#FF4D4D] border border-[#FFDADA] text-xs font-bold uppercase">
                        <span class="text-sm"><i class="fa-solid fa-bug"></i></span> BUG
                    </span>

                    <span
                        class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-[#FFF9E6] text-[#D97706] border border-[#FDE68A] text-xs font-bold uppercase">
                        <span class="text-sm"><i class="fa-solid fa-gear"></i></span> HELP WANTED
                    </span>
                </div>

                <div class="border-t border-gray-100 pt-4 mt-2">
                    <p class="text-slate-500 text-sm font-medium">#1 by john_doe</p>
                    <p class="text-slate-400 text-sm mt-1">1/15/2024</p>
                </div>
            </div>
        </div>


    </div>



</body>

</html>
